<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y2K Site</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .grid-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60%;
    perspective: 300px;
    perspective-origin: 50% 0%;
    overflow: hidden;
    z-index: 0;
  }

  .grid {
    width: 100%;
    height: 100%;
    transform-origin: top center;
    transform: rotateX(70deg);
    background-image:
      linear-gradient(to right, rgba(240, 230, 140, 0.7) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(240, 230, 140, 0.7) 1px, transparent 1px);
    background-size: 80px 80px;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
  }

  .scene {
    position: relative;
    width: 100vw;
    height: calc(100vw * 676 / 1024);
    max-height: 100vh;
    max-width: calc(100vh * 1024 / 676);
    margin: auto;
    z-index: 1;
  }

  .scene img.bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  .screen {
    position: absolute;
    left:   35.29%;
    top:    29.93%;
    width:  31.3%;
    height: 41.5%;
    border: none;
    background: #c0c0c0;
    overflow: hidden;
  }

  .screen iframe {
    width: calc(100% + 17px);
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

  <div class="grid-wrap">
    <div class="grid"></div>
  </div>

  <div class="scene">
    <img class="bg" src="your-y2k-image.png" alt="y2k background">
    <div class="screen">
      <!-- album.html 을 같은 폴더에 두면 됩니다 -->
      <iframe src="album.html" title="앨범 소개"></iframe>
    </div>
  </div>

</body>
</html>
